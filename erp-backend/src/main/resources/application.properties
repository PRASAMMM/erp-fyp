spring.application.name=erp-backend

# ── MongoDB Atlas ─────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGO_URI:mongodb+srv://mailprasam7_db_user:Databaseerp123@erpcluster.4uf90il.mongodb.net/erpDB?retryWrites=true&w=majority&connectTimeoutMS=30000&serverSelectionTimeoutMS=30000}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.address=0.0.0.0

# ── Performance (Fix for Render Free Tier Timeout) ────────────────────────────
spring.main.lazy-initialization=true

# ── Disable Spring Security ───────────────────────────────────────────────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration

# ── Groq AI (FREE cloud API — zero GPU, zero lag on laptop) ──────────────────
# Step 1: Go to https://console.groq.com
# Step 2: Sign up (free) → API Keys → Create key → copy it
# Step 3: Paste it below (or set env var GROQ_API_KEY for Railway deployment)
groq.api.key=${GROQ_API_KEY}

# Model options (all free):
#   llama-3.3-70b-versatile   ← smartest, recommended (default)
#   llama3-8b-8192            ← lighter, faster
#   mixtral-8x7b-32768        ← great for long context
#   gemma2-9b-it              ← Google's model
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# ── Error handling ────────────────────────────────────────────────────────────
server.error.whitelabel.enabled=false
server.error.include-message=always

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=Asia/Kolkata

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.erp=DEBUG
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.mongodb.driver=WARN

# ── ML Service ────────────────────────────────────────────────────────────────
ml.service.url=${ML_SERVICE_URL:http://localhost:5001}
